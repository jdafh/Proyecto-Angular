
 
<!-- DETALLE -->
<div class="detalle-wrapper" *ngIf="producto; else notFound">
  <div class="detalle-layout">
 
    <!-- IMAGEN -->
    <div class="imagen-panel">
      <div class="product-silhouette" [ngStyle]="{'background-color': producto.color}"></div>
    </div>
 
    <!-- INFO -->
    <div class="info-panel">
 
      <div class="divider-top"></div>
 
      <h1 class="product-title">{{ producto.name }}</h1>
 
      <p class="tallas-label">Talla: {{ producto.tallas.join(', ') }}</p>
      <p class="talla-seleccionada-label">Seleccionar talla:
        <span class="talla-badge">{{ tallaSeleccionada }}</span>
      </p>
 
      <div class="tallas-selector">
        <button
          *ngFor="let t of producto.tallas"
          class="talla-btn"
          [class.active]="t === tallaSeleccionada"
          (click)="seleccionarTalla(t)">
          {{ t }}
        </button>
      </div>
 
      <div class="cantidad-row">
        <span class="cantidad-label">Cantidad: <strong>{{ cantidad }}</strong></span>
        <div class="cantidad-controls">
          <button class="ctrl-btn" (click)="aumentar()">+</button>
          <span class="ctrl-sep">/</span>
          <button class="ctrl-btn" (click)="disminuir()">-</button>
        </div>
      </div>
 
      <p class="precio-label">Precio:
        <strong>{{ precioFormateado }}</strong>
      </p>
 
      <div *ngIf="cantidad > 1" class="total-label">
        Total: <strong>{{ totalFormateado }}</strong>
      </div>
 
      <hr class="divider" />
 
      <p class="pago-titulo">Metodo de pago:</p>
 
      <div class="pago-opciones">
        <button
          class="pago-btn"
          [class.selected]="metodoPago === 'Crédito'"
          (click)="seleccionarPago('Crédito')">Credito</button>
        <button
          class="pago-btn"
          [class.selected]="metodoPago === 'Débito'"
          (click)="seleccionarPago('Débito')">Debito</button>
        <button
          class="pago-btn"
          [class.selected]="metodoPago === 'Efectivo'"
          (click)="seleccionarPago('Efectivo')">Efectivo</button>
      </div>
 
      <button class="btn-finalizar" (click)="finalizar()">Finalizar Compra</button>
 
    </div>
  </div>
</div>
 
<ng-template #notFound>
  <div class="not-found">
    <p>Producto no encontrado.</p>
    <button class="btn-volver" (click)="volver()">← Volver al catálogo</button>
  </div>
</ng-template>
