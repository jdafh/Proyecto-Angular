<div class="container my-5">

    <div class="border-start border-dark ps-4 w-100">
      <textarea class="form-control border-0 bg-transparent" rows="6" placeholder="Escribe tu comentario aquí..."></textarea>

  </div>

  
  <div class="d-flex justify-content-between align-items-center">

    <button class="btn btn-outline-dark px-4">Volver a publicar</button>

  </div>

</div>
