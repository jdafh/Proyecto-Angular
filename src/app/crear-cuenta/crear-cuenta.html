<div class="login-wrapper">

  <!-- Imágenes decorativas izquierda -->
  <div class="deco-left">
    <img src="assets/zapatos_7.png" class="deco-img rotate-1" />
    <img src="assets/zapatos_8.png" class="deco-img rotate-2" />
    <img src="assets/zapatos_9.png" class="deco-img rotate-3" />
  </div>

  <!-- Formulario centro -->
  <div class="login-card">
    <div class="text-center mb-4">
      <button class="btn btn-outline-dark rounded-pill px-4 fw-bold">Creación de Usuario</button>
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Correo:</label>
      <input type="email" class="form-control bg-light border-0" />
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Contraseña:</label>
      <input type="password" class="form-control bg-light border-0" />
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Repetir Contraseña:</label>
      <input type="password" class="form-control bg-light border-0" />
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Numero de celular:</label>
      <input type="tel" class="form-control bg-light border-0" />
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Nombre de Usuario:</label>
      <input type="text" class="form-control bg-light border-0" />
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-outline-dark rounded-pill px-4 fw-bold">Crear Usuario</button>
      <p class="mt-3 fw-bold small" style="cursor:pointer;" routerLink="/home">Volver a inicio</p>
    </div>
  </div>

  <!-- Imágenes decorativas derecha -->
  <div class="deco-right">
    <img src="assets/zapatos_10.png" class="deco-img rotate-4" />
    <img src="assets/zapatos_11.png" class="deco-img rotate-5" />
    <img src="assets/zapatos_12.png" class="deco-img rotate-6" />
  </div>

</div>
