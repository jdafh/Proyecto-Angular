<div class="login-wrapper">

  <!-- Imágenes decorativas izquierda -->
  <div class="deco-left">
    <img src="assets/zapatos_1.png" class="deco-img rotate-1" />
    <img src="assets/zapatos_2.png" class="deco-img rotate-2" />
    <img src="assets/zapatos_3.png" class="deco-img rotate-3" />
  </div>

  <!-- Formulario centro -->
  <div class="login-card">
    <div class="mb-4">
      <label class="fw-bold mb-1">Correo o Nombre de Usuario:</label>
      <input type="text" class="form-control bg-light border-0" />
      <small class="text-muted mt-1 d-block">Olvidó Nombre de Usuario</small>
    </div>

    <div class="mb-3">
      <label class="fw-bold mb-1">Contraseña:</label>
      <input type="password" class="form-control bg-light border-0" />
      <small class="text-muted mt-1 d-block">Restablecer contraseña</small>
      <small class="text-muted d-block" style="cursor:pointer;" routerLink="/crear-cuenta">Crear una cuenta</small>
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-outline-dark rounded-pill px-4 fw-bold">Iniciar Sesión</button>
      <p class="mt-3 fw-bold small" style="cursor:pointer;" routerLink="/home">Volver a inicio</p>
    </div>
  </div>

  <!-- Imágenes decorativas derecha -->
  <div class="deco-right">
    <img src="assets/zapatos_4.png" class="deco-img rotate-4" />
    <img src="assets/zapatos_5.png" class="deco-img rotate-5" />
    <img src="assets/zapatos_6.png" class="deco-img rotate-6" />
  </div>

</div>
